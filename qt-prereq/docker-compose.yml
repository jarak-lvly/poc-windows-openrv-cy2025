services:
  windows:
    image: dockurr/windows
    container_name: kewtie
    environment:
      VERSION: "11"
      USERNAME: "myuser"  # CHANGE THIS before running
      PASSWORD: "supersecretpassword"  # CHANGE THIS before running
      CPU_CORES: "6"
      RAM_SIZE: "24G"
      DISK_SIZE: "60G"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - ./windows:/storage
      - ./oem:/oem
      - ../shared:/shared
    restart: always
    stop_grace_period: 2m

